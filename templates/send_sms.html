{% extends 'base.html' %}
{% block content %}
<h3 class="mb-4">发送短信</h3>
<form method="post" class="card p-3">
  <div class="mb-3"><label class="form-label">模块</label><select class="form-select" name="module_id">{% for modem in modems %}<option value="{{ modem.module_id }}">{{ modem.remark }} - {{ modem.port }}</option>{% endfor %}</select></div>
  <div class="mb-3"><label class="form-label">手机号</label><input class="form-control" name="phone"></div>
  <div class="mb-3"><label class="form-label">短信内容</label><textarea class="form-control" name="content" rows="5"></textarea></div>
  <button class="btn btn-primary">发送</button>
</form>
{% endblock %}
