<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'EC20 SMS Forwarder' }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-lg-2 sidebar p-3">
      <h5 class="text-white mb-3">EC20 SMS</h5>
      <a href="{{ url_for('main.dashboard') }}"><i class="fa-solid fa-gauge me-2"></i>首页</a>
      <a href="{{ url_for('main.modems') }}"><i class="fa-solid fa-microchip me-2"></i>模块管理</a>
      <a href="{{ url_for('main.sms_records') }}"><i class="fa-solid fa-message me-2"></i>短信记录</a>
      <a href="{{ url_for('main.manual_read') }}"><i class="fa-solid fa-inbox me-2"></i>手动读取短信</a>
      <a href="{{ url_for('main.send_sms') }}"><i class="fa-solid fa-paper-plane me-2"></i>发送短信</a>
      <a href="{{ url_for('main.mail_config') }}"><i class="fa-solid fa-envelope me-2"></i>邮件转发配置</a>
      <a href="{{ url_for('main.settings') }}"><i class="fa-solid fa-sliders me-2"></i>系统设置</a>
      <a href="{{ url_for('main.at_debug') }}"><i class="fa-solid fa-terminal me-2"></i>AT 调试</a>
      <a href="{{ url_for('main.logs') }}"><i class="fa-solid fa-file-lines me-2"></i>日志</a>
      <a href="{{ url_for('main.database_page') }}"><i class="fa-solid fa-database me-2"></i>数据库维护</a>
      <a href="{{ url_for('auth.logout') }}"><i class="fa-solid fa-right-from-bracket me-2"></i>退出</a>
    </nav>
    <main class="col-lg-10 p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function confirmReboot(){return confirm('确定重启该模块吗？')}
</script>
</body>
</html>
