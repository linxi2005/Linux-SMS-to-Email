<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-3">EC20 SMS 登录</h4>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
          {% endwith %}
          <form method="post">
            <div class="mb-3"><label class="form-label">用户名</label><input class="form-control" name="username" value="admin"></div>
            <div class="mb-3"><label class="form-label">密码</label><input class="form-control" name="password" type="password"></div>
            <button class="btn btn-primary w-100">登录</button>
          </form>
          <div class="text-muted small mt-3">首次默认账号 admin，密码 admin，请部署后立即修改配置。</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
